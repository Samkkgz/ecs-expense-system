# ECS v4.4 - nginx 网关
# 认证优先级：Authorization header > apikey header
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    # apikey 转为 Bearer（仅当没有 Authorization 时使用）
    map $http_apikey $apikey_bearer {
        "~."    "Bearer $http_apikey";
        default "";
    }

    # 优先使用 Authorization，否则降到 apikey
    map $http_authorization $final_auth {
        "~."    $http_authorization;
        default $apikey_bearer;
    }

    server {
        listen 8000;
        root /usr/share/nginx/html;
        index index.html;

        location /auth/v1/ {
            proxy_pass http://auth:9999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /rest/v1/ {
            proxy_pass http://rest:3000/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $final_auth;
        }

        location /storage/v1/ {
            proxy_pass http://storage:5000/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $final_auth;
            client_max_body_size 50m;
        }

        location /functions/v1/ {
            proxy_pass http://ocr:9000/;
            proxy_set_header Host $host;
        }
    }
}
