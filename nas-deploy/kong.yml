# ============================================================
# Kong 路由配置 - 将请求转发到正确的服务
# ============================================================
_format_version: "3.0"

services:

  # ---- 认证服务 (GoTrue) ----
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-routes
        paths:
          - /auth/v1
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins: "*"
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Content-Type", "Authorization", "apikey", "X-Client-Info"]
          exposed_headers: ["Content-Range", "X-Total-Count"]

  # ---- REST API (PostgREST) ----
  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-routes
        paths:
          - /rest/v1
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins: "*"
          methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
          headers: ["Content-Type", "Authorization", "apikey", "X-Client-Info", "Prefer"]
          exposed_headers: ["Content-Range", "X-Total-Count"]

  # ---- OCR 识别服务 (Edge Function 替代) ----
  - name: ocr-service
    url: http://ocr:9000
    routes:
      - name: ocr-routes
        paths:
          - /functions/v1
        strip_path: false
        methods:
          - POST
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins: "*"
          methods: ["POST", "OPTIONS"]
          headers: ["Content-Type", "Authorization", "apikey", "X-Client-Info"]
          exposed_headers: ["Content-Range", "X-Total-Count"]

  # ---- 文件存储 (Storage API) ----
  - name: storage-service
    url: http://storage:5000
    routes:
      - name: storage-routes
        paths:
          - /storage/v1
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins: "*"
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Content-Type", "Authorization", "apikey", "X-Client-Info"]
          exposed_headers: ["Content-Range", "X-Total-Count"]
