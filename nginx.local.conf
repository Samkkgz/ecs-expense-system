# ECS v4.5 - nginx 本地测试版（含 OCR）
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    map $http_apikey $apikey_bearer {
        "~."    "Bearer $http_apikey";
        default "";
    }

    map $http_authorization $final_auth {
        "~."    $http_authorization;
        default $apikey_bearer;
    }

    server {
        listen 8000;
        root /usr/share/nginx/html;
        index index.html;

        location /auth/v1/ {
            proxy_pass http://auth:9999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /rest/v1/ {
            proxy_pass http://rest:3000/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $final_auth;
        }

        location /storage/v1/ {
            proxy_pass http://storage:5000/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $final_auth;
            client_max_body_size 50m;
        }

        location /functions/v1/ {
            proxy_pass http://ocr:9000/;
            proxy_set_header Host $host;
        }
    }
}
